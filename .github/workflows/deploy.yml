name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # anon/publishable key 屬可公開金鑰,進入前端 bundle 是預期行為(見 SPEC.md 第 5 節)
      VITE_SUPABASE_URL: https://ugdadpjvhajmkfblaxsd.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_n9jLtdTmvJW0nWiHABV3yA_6_WQSaAM
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
